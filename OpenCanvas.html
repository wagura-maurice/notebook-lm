<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Powered MD Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dragula@3.7.3/dist/dragula.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turndown@7.1.1/dist/turndown.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/dragula@3.7.3/dist/dragula.min.css"
    />
    <style>
      .md-block {
        margin-bottom: 1rem;
        padding: 0.5rem;
        border-radius: 0.25rem;
        transition: all 0.2s;
      }
      .md-block:hover {
        background-color: rgba(55, 65, 81, 0.5);
        outline: 1px dashed rgba(156, 163, 175, 0.5);
      }
      .editable {
        min-height: 1.5em;
        padding: 0.25rem;
      }
      .editable:focus {
        outline: 2px solid #3b82f6;
        background-color: rgba(59, 130, 246, 0.1);
      }
      #editor {
        height: 100%;
      }
      .ql-container {
        height: calc(100% - 40px);
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white">
    <div class="flex h-screen">
      <!-- AI Chat Panel -->
      <div class="w-1/3 border-r border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-700">
          <h2 class="text-xl font-bold">AI Assistant</h2>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
          <div class="p-3 bg-gray-800 rounded-lg">
            <strong>AI:</strong> Hello! I can help you with your markdown
            content. Ask me anything!
          </div>
        </div>
        <div class="p-4 border-t border-gray-700">
          <div class="flex space-x-2">
            <input
              id="chat-input"
              type="text"
              placeholder="Ask AI to help with your content..."
              class="flex-1 bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
            <button
              onclick="sendMessage()"
              class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 transition"
            >
              Send
            </button>
          </div>
        </div>
      </div>

      <!-- Quill Editor Panel -->
      <div class="w-2/3 flex flex-col">
        <div
          class="p-4 border-b border-gray-700 flex justify-between items-center"
        >
          <div class="flex space-x-2">
            <button
              onclick="clearEditor()"
              class="px-3 py-1 bg-red-600 rounded hover:bg-red-700 transition"
            >
              Clear
            </button>
          </div>
          <div id="status" class="text-sm text-gray-400">Quill Editor</div>
        </div>

        <div id="editor">
          <div id="toolbar">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
            <button class="ql-link"></button>
            <button class="ql-image"></button>
          </div>
          <div id="editor-container"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.core.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.snow.js"></script>
    <script>
      const md = window.markdownit({
        html: true,
        linkify: true,
        typographer: true,
      });
      const editor = document.getElementById("editor");
      const status = document.getElementById("status");
      const chatMessages = document.getElementById("chat-messages");
      const chatInput = document.getElementById("chat-input");

      // Initialize editor
      function renderMD() {
        if (editor.dataset.rawMd.trim() === "") {
          editor.innerHTML =
            '<div class="text-gray-500 italic">Start writing markdown here...</div>';
        } else {
          editor.innerHTML = md.render(editor.dataset.rawMd);
          setupEditableBlocks();
        }
      }

      // Make all blocks editable
      function setupEditableBlocks() {
        editor.querySelectorAll("*").forEach((el) => {
          if (el.children.length > 0 || el.textContent.trim() !== "") {
            el.classList.add("md-block");
            el.setAttribute("draggable", "true");

            // Skip making certain elements editable
            if (!el.matches("pre, code, img")) {
              el.classList.add("editable");
              el.setAttribute("contenteditable", "true");

              el.addEventListener("blur", () => {
                updateRawMD();
              });

              el.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                  e.preventDefault();
                  updateRawMD();
                  el.blur();
                }
              });
            }
          }
        });
      }

      // Drag-and-drop
      dragula([editor], {
        moves: (el) => el.classList.contains("md-block"),
      }).on("drop", updateRawMD);

      // Update raw MD after edits
      function updateRawMD() {
        const turndown = new TurndownService();
        editor.dataset.rawMd = turndown.turndown(editor.innerHTML);
        if (editor.dataset.mode === "rich") {
          renderMD(); // Re-render to clean up any HTML artifacts
        }
      }

      // Toggle edit mode
      function toggleEditMode() {
        editor.dataset.mode = editor.dataset.mode === "raw" ? "rich" : "raw";
        if (editor.dataset.mode === "raw") {
          editor.textContent = editor.dataset.rawMd;
          status.textContent = "Raw mode (edit markdown directly)";
        } else {
          renderMD();
          status.textContent = "Rich mode (drag blocks to rearrange)";
        }
      }

      // Clear editor content
      function clearEditor() {
        if (confirm("Are you sure you want to clear all content?")) {
          editor.dataset.rawMd = "# New Document\n\nStart editing here...";
          if (editor.dataset.mode === "rich") {
            renderMD();
          } else {
            editor.textContent = "# New Document\n\nStart editing here...";
          }
        }
      }

      // Copy markdown to clipboard
      function copyToClipboard() {
        navigator.clipboard
          .writeText(editor.dataset.rawMd)
          .then(() => addChatMessage("System", "Markdown copied to clipboard!"))
          .catch((err) => addChatMessage("System", "Failed to copy: " + err));
      }

      // Chat functionality
      function sendMessage() {
        const message = chatInput.value.trim();
        if (message) {
          addChatMessage("You", message);
          chatInput.value = "";

          // Simulate AI response
          setTimeout(() => {
            const responses = [
              "I can help you format that content. Try adding headings with #, ##, or ###.",
              "For lists, use - or * for bullet points, or 1. for numbered lists.",
              "Would you like me to suggest improvements for your markdown?",
              "You can create links with [text](url) and images with ![alt](url).",
              "For code blocks, wrap your code in ``` with an optional language identifier.",
            ];
            const randomResponse =
              responses[Math.floor(Math.random() * responses.length)];
            addChatMessage("AI", randomResponse);
          }, 1000);
        }
      }

      function addChatMessage(sender, text) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `p-3 rounded-lg ${
          sender === "You" ? "bg-gray-800" : "bg-gray-700"
        }`;
        messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      // Handle Enter key in chat
      chatInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      // Initialize
      renderMD();
    </script>
  </body>
</html>
