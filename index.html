<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook LM - Index Page</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ["Rubik", "sans-serif"],
            poppins: ["Poppins", "sans-serif"],
          },
          extend: {
            colors: {
              "dark-blue": "#0f172a",
              "blue-gray": "#1e293b",
              "accent-blue": "#38bdf8",
              "purple-500": "#8b5cf6",
            },
          },
        },
      };
    </script>

    <!-- Sweet Alert 2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link href="./css/index.css" rel="stylesheet" />
  </head>
  <body class="h-screen flex flex-col bg-dark-blue overflow-hidden font-sans">
    <!-- Header Section -->
    <!-- with mobile navigation included -->
    <header class="px-4 py-3 bg-dark-blue min-h-16 lg:h-20 shadow-md">
      <div class="flex flex-col lg:flex-row h-full lg:items-center mx-auto">
        <div
          class="flex items-center justify-between w-full lg:w-auto lg:flex-1"
        >
          <!-- Logo -->
          <div class="flex items-center">
            <img
              src="./images/logo-Microidea-white.svg"
              alt="Logo"
              class="h-10 w-10 lg:h-12 lg:w-12 rounded-full mr-3"
            />
          </div>

          <!-- Mobile Icons -->
          <div class="lg:hidden flex items-center space-x-3">
            <button
              class="text-gray-300 hover:text-accent-blue p-2 rounded-full hover:bg-blue-gray transition-colors"
            >
              <i class="fas fa-share-alt fa-md"></i>
            </button>
            <button
              class="text-gray-300 hover:text-accent-blue p-2 rounded-full hover:bg-blue-gray transition-colors"
            >
              <i class="fas fa-cog fa-md"></i>
            </button>
            <div class="relative h-8 w-8">
              <img
                src="https://ui-avatars.com/api/?name=Peter+Thirikwa&background=6366f1&color=fff&rounded=true&size=40"
                class="h-full w-full rounded-full object-cover cursor-pointer hover:opacity-90 transition-opacity"
              />
              <div
                class="absolute inset-0 rounded-full border-2 border-green-500 pointer-events-none"
              ></div>
            </div>
          </div>
        </div>

        <!-- Title -->
        <h1
          class="text-center lg:text-left text-lg lg:text-2xl font-bold text-white hover:text-accent-blue transition-colors mt-2 lg:mt-0 lg:mx-4 lg:flex-1"
        >
          NotebookLM Pro
        </h1>

        <!-- Desktop Icons -->
        <div
          class="hidden lg:flex items-center justify-end space-x-3 lg:flex-1"
        >
          <button
            class="text-gray-300 hover:text-accent-blue p-2 rounded-full hover:bg-blue-gray transition-colors"
          >
            <i class="fas fa-share-alt fa-md"></i>
          </button>
          <button
            class="text-gray-300 hover:text-accent-blue p-2 rounded-full hover:bg-blue-gray transition-colors"
          >
            <i class="fas fa-cog fa-md"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden" id="columns-container">
      <!-- add content similar to -->
    </div>

    <!-- Modals -->
    <!-- the code for the model to be shown by the even of clicking the addSourceBtn -->

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
